    let x=document.getElementById("p1")
    size=15
    function inc(){
        y= setInterval(()=>{
            x.innerHTML="Hello"
            x.style.fontSize=size+"px"
            if(size<=200){
                size++
                console.log(size)
            }
            else{
                clearInterval(y)
            }
        },100)
    }
    function dec(){
        y= setInterval(()=>{
            x.innerHTML="Hello"
            x.style.fontSize=size+"px"
            if(size>=15){
                size--
            }
            else{
                clearInterval(y)
            }
        },100)

    }
    function stop(){
        clearInterval(y)
